<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPv4 Prefix Subtractor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e2e; color: #cdd6f4; padding: 2rem; }
  h1 { text-align: center; margin-bottom: 1.5rem; color: #89b4fa; }
  .container { max-width: 800px; margin: 0 auto; }
  label { display: block; font-weight: 600; margin-bottom: 0.3rem; color: #a6adc8; }
  input, textarea { width: 100%; padding: 0.6rem 0.8rem; border: 1px solid #45475a; border-radius: 6px; background: #313244; color: #cdd6f4; font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 0.95rem; }
  input:focus, textarea:focus { outline: none; border-color: #89b4fa; }
  textarea { resize: vertical; min-height: 120px; }
  .hint { font-size: 0.8rem; color: #6c7086; margin-top: 0.2rem; margin-bottom: 1rem; }
  button { display: inline-block; padding: 0.7rem 2rem; background: #89b4fa; color: #1e1e2e; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; }
  button:hover { background: #74c7ec; }
  .error { color: #f38ba8; font-weight: 600; margin-top: 1rem; }
  #results { margin-top: 1.5rem; }
  table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
  th { text-align: left; padding: 0.5rem 0.8rem; background: #313244; color: #89b4fa; border-bottom: 2px solid #45475a; }
  td { padding: 0.5rem 0.8rem; border-bottom: 1px solid #45475a; font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 0.9rem; }
  tr:hover td { background: #313244; }
  .summary { margin-top: 1rem; padding: 0.8rem; background: #313244; border-radius: 6px; font-size: 0.9rem; }
  .summary span { color: #a6e3a1; font-weight: ​600; }
</style>
</head>
<body>
<div class="container">
  <h1>🔀 IPv4 Prefix Subtractor</h1>

  <label for="mainPrefix">Main prefix</label>
  <input type="text" id="mainPrefix" placeholder="e.g. 10.0.0.0/8 or 10/8" value="10.0.0.0/8">
  <div class="hint">Short form accepted: 10/8 → 10.0.0.0/8</div>

  <label for="removePrefixes">Prefixes to remove (one per line)</label>
  <textarea id="removePrefixes" placeholder="e.g.&#10;10.1.0.0/16&#10;10.2.0.0/16&#10;10.0.0.0/24"></textarea>
  <div class="hint">Short forms accepted. Empty lines and duplicates are ignored.</div>

  <button onclick="calculate()">Calculate remaining ranges</button>

  <div id="error" class="error"></div>
  <div id="results"></div>
</div>

<script>
// --- IP math helpers ---
function ipToNum(ip) {
  const parts = ip.split('.').map(Number);
  return ((parts[0] << 24) | (parts[1] << 16) | (parts[2] << 8) | parts[3]) >>> 0;
}

function numToIp(n) {
  return [(n >>> 24) & 255, (n >>> 16) & 255, (n >>> 8) & 255, n & 255].join('.');
}

function parsePrefix(str) {
  str = str.trim();
  if (!str) return null;
  const m = str.match(/^(\d{1,3}(?:\.\d{1,3})*)\/(\d{1,2})$/);
  if (!m) throw new Error(`Invalid prefix: "${str}"`);
  let ipPart = m[1];
  const len = parseInt(m[2], 10);
  if (len < 0 || len > 32) throw new Error(`Invalid prefix length: /${len}`);
  // Expand short form: 10/8 → 10.0.0.0/8
  const octets = ipPart.split('.').map(Number);
  while (octets.length < 4) octets.push(0);
  if (octets.some(o => o < 0 || o > 255 || !Number.isInteger(o)))
    throw new Error(`Invalid IP octets in: "${str}"`);
  const ip = ((octets[0] << 24) | (octets[1] << 16) | (octets[2] << 8) | octets[3]) >>> 0;
  const mask = len === 0 ? 0 : (0xFFFFFFFF << (32 - len)) >>> 0;
  const network = (ip & mask) >>> 0;
  if (network !== ip)
    throw new Error(`"${str}" is not a valid network address (should be ${numToIp(network)}/${len})`);
  return { start: network, len, end: (network | (~mask >>> 0)) >>> 0 };
}

// Subtract one prefix from a list of prefix-ranges, returning new list
function subtractPrefix(ranges, sub) {
  const result = [];
  for (const r of ranges) {
    // No overlap
    if (sub.end < r.start || sub.start > r.end) {
      result.push(r);
      continue;
    }
    // Full cover
    if (sub.start <= r.start && sub.end >= r.end) continue;
    // Partial overlap — split
    if (sub.start > r.start) {
      result.push({ start: r.start, end: sub.start - 1 });
    }
    if (sub.end < r.end) {
      result.push({ start: sub.end + 1, end: r.end });
    }
  }
  return result;
}

// Break an arbitrary start–end range into CIDR prefixes
function rangeToCidrs(start, end) {
  const cidrs = [];
  while (start <= end) {
    // Find the largest block starting at 'start' that fits within [start, end]
    let maxLen = 32;
    // Alignment: how many trailing zeros does 'start' have?
    if (start !== 0) {
      let tz = 0;
      let v = start;
      while ((v & 1) === 0 && tz < 32) { tz++; v >>>= 1; }
      maxLen = 32 - tz;
    } else {
      maxLen = 0;
    }
    // Fit within range
    while (maxLen > 0) {
      const mask = maxLen === 0 ? 0 : (0xFFFFFFFF << (32 - maxLen)) >>> 0;
      const blockEnd = (start | (~mask >>> 0)) >>> 0;
      if (blockEnd <= end) break;
      maxLen++;
    }
    const mask = maxLen === 0 ? 0 : (0xFFFFFFFF << (32 - maxLen)) >>> 0;
    const blockEnd = (start | (~mask >>> 0)) >>> 0;
    cidrs.push({ start, end: blockEnd, len: maxLen });
    if (blockEnd === 0xFFFFFFFF) break;
    start = blockEnd + 1;
  }
  return cidrs;
}

function formatCount(n) {
  return n.toLocaleString();
}

function calculate() {
  const errDiv = document.getElementById('error');
  const resDiv = document.getElementById('results');
  errDiv.textContent = '';
  resDiv.innerHTML = '';

  try {
    const main = parsePrefix(document.getElementById('mainPrefix').value);
    if (!main) throw new Error('Please enter a main prefix.');

    const removeText = document.getElementById('removePrefixes').value;
    const removeLines = removeText.split('\n').map(s => s.trim()).filter(Boolean);
    const subs = [];
    for (const line of removeLines) {
      const p = parsePrefix(line);
      if (p) subs.push(p);
    }

    // Sort removals by start then by length (larger blocks first)
    subs.sort((a, b) => a.start - b.start || a.len - b.len);

    // Start with the main range
    let remaining = [{ start: main.start, end: main.end }];

    // Subtract each prefix
    for (const sub of subs) {
      remaining = subtractPrefix(remaining, sub);
    }

    // Merge adjacent ranges
    remaining.sort((a, b) => a.start - b.start);
    const merged = [];
    for (const r of remaining) {
      if (merged.length && merged[merged.length - 1].end + 1 === r.start) {
        merged[merged.length - 1].end = r.end;
      } else {
        merged.push({ ...r });
      }
    }

    // Convert each range to CIDRs
    const allCidrs = [];
    for (const r of merged) {
      allCidrs.push(...rangeToCidrs(r.start, r.end));
    }

    const totalMain = main.end - main.start + 1;
    const totalRemoved = subs.reduce((acc, s) => {
      const overlap = Math.max(0, Math.min(s.end, main.end) - Math.max(s.start, main.start) + 1);
      return acc + overlap;
    }, 0);
    const totalRemaining = allCidrs.reduce((acc, c) => acc + (c.end - c.start + 1), 0);

    let html = `<div class="summary">
      Main range: <span>${numToIp(main.start)}/${main.len}</span> (${formatCount(totalMain)} IPs)<br>
      Prefixes removed: <span>${subs.length}</span><br>
      Remaining: <span>${formatCount(totalRemaining)}</span> IPs in <span>${allCidrs.length}</span> prefix(es)
    </div>`;

    if (allCidrs.length === 0) {
      html += '<p style="margin-top:1rem; color:#f9e2af;">The entire range was removed — nothing remaining.</p>';
    } else {
      html += `<table>
        <tr><th>#</th><th>Prefix</th><th>Range (from → to)</th><th>IPs</th></tr>`;
      allCidrs.forEach((c, i) => {
        html += `<tr>
          <td>${i + 1}</td>
          <td>${numToIp(c.start)}/${c.len}</td>
          <td>${numToIp(c.start)} → ${numToIp(c.end)}</td>
          <td>${formatCount(c.end - c.start + 1)}</td>
        </tr>`;
      });
      html += '</table>';

      // Aggregated consecutive ranges table
      // Merge CIDR entries whose ranges are consecutive into single from→to ranges
      const aggRanges = [];
      for (const c of allCidrs) {
        if (aggRanges.length && aggRanges[aggRanges.length - 1].end + 1 === c.start) {
          aggRanges[aggRanges.length - 1].end = c.end;
        } else {
          aggRanges.push({ start: c.start, end: c.end });
        }
      }

      html += `<h2 style="margin-top:2rem; color:#89b4fa; font-size:1.1rem;">📊 Aggregated Consecutive Ranges</h2>`;
      html += `<p style="margin-top:0.3rem; margin-bottom:0.5rem; color:#6c7086; font-size:0.85rem;">Adjacent prefixes merged into contiguous IP ranges.</p>`;
      html += `<table>
        <tr><th>#</th><th>From</th><th>To</th><th>IPs</th></tr>`;
      aggRanges.forEach((r, i) => {
        html += `<tr>
          <td>${i + 1}</td>
          <td>${numToIp(r.start)}</td>
          <td>${numToIp(r.end)}</td>
          <td>${formatCount(r.end - r.start + 1)}</td>
        </tr>`;
      });
      html += '</table>';
    }

    resDiv.innerHTML = html;
  } catch (e) {
    errDiv.textContent = e.message;
  }
}
</script>
</body>
</html>
